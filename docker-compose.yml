services:
  wasel-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wasel-db-container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"

  wasel_palestine.pl:
    image: ${DOCKER_REGISTRY-}waselpalestinepl
    build:
      context: .
      dockerfile: Wasel_Palestine.PL/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # السطر السحري اللي بيحل مشكلة الـ LocalDB
      - ConnectionStrings__DefaultConnection=Server=wasel-db;Database=WaselPalestineDB;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;Encrypt=False
    ports:
      - "5034:8080"
    depends_on:
      - wasel-db